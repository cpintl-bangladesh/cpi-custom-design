<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- Co-branded Logo: CPI + YPSA -->
  <!-- For use in headers, footers, reports -->
  
  <defs>
    <style>
      .cpi-white { fill: #FFFFFF; }
      .ypsa-white { fill: #FFFFFF; }
    </style>
  </defs>
  
  <!-- Left: CPI Logo (white) -->
  <g transform="translate(10, 10)">
    <circle cx="30" cy="30" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="30" cy="22" r="6" fill="#FFFFFF"/>
    <circle cx="38" cy="30" r="6" fill="#FFFFFF"/>
    <circle cx="22" cy="30" r="6" fill="#FFFFFF"/>
    <text x="55" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="28" class="cpi-white">CPI</text>
  </g>
  
  <!-- Divider -->
  <rect x="140" y="20" width="1" height="60" fill="#D0C4C5"/>
  
  <!-- Right: YPSA Logo (white) -->
  <g transform="translate(160, 10)">
    <!-- Simplified YPSA circle -->
    <circle cx="30" cy="30" r="28" fill="#0B0B45"/>
    <circle cx="30" cy="30" r="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="20" cy="30" r="6" fill="#FFFFFF"/>
    <circle cx="30" cy="22" r="6" fill="#FFFFFF"/>
    <circle cx="40" cy="30" r="6" fill="#FFFFFF"/>
    <text x="70" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="18" class="ypsa-white">YPSA</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="8" fill="#CCCCCC">ইপসা</text>
  </g>
  
  <!-- Bottom rule -->
  <rect x="10" y="90" width="380" height="3" fill="#D91E4D"/>
</svg>