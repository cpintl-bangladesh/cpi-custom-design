<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- ZarishHealth Social Media Avatar / Social Share Image -->
  <!-- For LinkedIn, Twitter, Facebook sharing -->
  
  <defs>
    <linearGradient id="socialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00272C;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00555A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#025259;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#socialGrad)"/>
  
  <!-- Large logo mark (centered) -->
  <g transform="translate(200, 160)">
    <path d="M0 -70 
             Q50 -70 70 -30 
             Q90 20 70 80 
             Q0 120 -70 80 
             Q-90 20 -70 -30 
             Q-50 -70 0 -70" 
          fill="#FFFFFF" opacity="0.15"/>
    
    <path d="M0 -50 
             Q35 -50 50 -20 
             Q65 15 50 55 
             Q0 85 -50 55 
             Q-65 15 -50 -20 
             Q-35 -50 0 -50" 
          fill="#FFFFFF" opacity="0.3"/>
    
    <path d="M0 -30 
             Q22 -30 30 -10 
             Q40 15 30 35 
             Q0 55 -30 35 
             Q-40 15 -30 -10 
             Q-22 -30 0 -30" 
          fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Inner leaf -->
    <path d="M0 -15 
             Q12 -15 18 -5 
             Q25 10 18 25 
             Q0 38 -18 25 
             Q-25 10 -18 -5 
             Q-12 -15 0 -15" 
          fill="#FFFFFF"/>
    
    <!-- Center accent -->
    <circle cx="0" cy="8" r="8" fill="#285CCC"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="300" 
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="48" 
        fill="#FFFFFF">zarish</text>
  
  <text x="200" y="345" 
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="48" 
        fill="#285CCC">health</text>
  
  <!-- Tagline -->
  <text x="200" y="375" 
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif" 
        font-weight="500" 
        font-size="12" 
        letter-spacing="4" 
        fill="#F7F9EC" 
        opacity="0.6">EMR PLATFORM</text>
</svg>