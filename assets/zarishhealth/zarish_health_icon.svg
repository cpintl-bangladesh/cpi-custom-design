<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ZarishHealth Icon / App Icon -->
  <!-- Circular badge with leaf motif -->
  
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00555A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#025259;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#iconGrad)"/>
  
  <!-- Leaf mark (centered) -->
  <g transform="translate(32, 32)">
    <path d="M0 -14 
             Q8 -14 12 -6 
             Q18 4 12 14 
             Q0 22 -12 14 
             Q-18 4 -12 -6 
             Q-8 -14 0 -14" 
          fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Vein lines -->
    <path d="M0 -8 Q0 0 0 10" 
          fill="none" stroke="#00555A" stroke-width="2" stroke-linecap="round"/>
    <path d="M-6 -2 Q0 -2 6 -2" 
          fill="none" stroke="#00555A" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Center accent -->
    <circle cx="0" cy="0" r="4" fill="#285CCC"/>
  </g>
</svg>