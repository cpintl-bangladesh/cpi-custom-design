<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <!-- ZarishHealth Presentation Header -->
  <!-- For reports, presentations, slides -->
  
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00272C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00555A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#025259;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="120" fill="url(#headerGrad)"/>
  
  <!-- Logo Mark (left) -->
  <g transform="translate(40, 40)">
    <path d="M20 0 
             Q28 0 32 10 
             Q40 22 32 34 
             Q20 44 8 34 
             Q0 22 8 10 
             Q12 0 20 0" 
          fill="#FFFFFF" opacity="0.95"/>
    <circle cx="20" cy="18" r="4" fill="#285CCC"/>
  </g>
  
  <!-- Logo Text (left of mark) -->
  <text x="80" y="52" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="28" 
        fill="#FFFFFF">zarish</text>
  <text x="170" y="52" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="28" 
        fill="#285CCC">health</text>
  
  <text x="80" y="72" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="500" 
        font-size="10" 
        letter-spacing="3" 
        fill="#F7F9EC" 
        opacity="0.7">EMR PLATFORM</text>
  
  <!-- Right side: Program info / Report title -->
  <text x="800" y="45" 
        text-anchor="end"
        font-family="Inter, Arial, sans-serif" 
        font-weight="600" 
        font-size="16" 
        fill="#FFFFFF" 
        opacity="0.9">Program Report</text>
  <text x="800" y="65" 
        text-anchor="end"
        font-family="Inter, Arial, sans-serif" 
        font-weight="400" 
        font-size="11" 
        fill="#F7F9EC" 
        opacity="0.6">Q1 2026 | Cox's Bazar</text>
  
  <!-- Decorative accent line -->
  <rect x="40" y="105" width="720" height="3" fill="#285CCC" opacity="0.6"/>
</svg>