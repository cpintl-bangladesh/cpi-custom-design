<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <!-- ZarishHealth Logo - Professional Modern Design -->
  <!-- Design Concept: "Growth in Motion" - Stylized flowering leaf motif -->
  <!-- Version: Primary (for light backgrounds) -->
  
  <defs>
    <!-- Gradient Definitions -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00555A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#025259;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Mark: Stylized Leaf/Flower -->
  <g transform="translate(10, 10)">
    <!-- Primary leaf shape -->
    <path d="M20 5 
             Q25 5 28 12 
             Q35 20 28 28 
             Q20 35 12 28 
             Q5 20 12 12 
             Q15 5 20 5" 
          fill="url(#leafGrad)" opacity="0.95"/>
    
    <!-- Inner detail - stylized veins -->
    <path d="M20 12 Q20 18 20 24 Q20 18 20 12" 
          fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M16 16 Q20 18 24 16" 
          fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Accent dot - represents patient/center -->
    <circle cx="20" cy="18" r="3" fill="#285CCC"/>
  </g>
  
  <!-- Wordmark: "zarish" -->
  <text x="60" y="38" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="32" 
        fill="#00555A">zarish</text>
  
  <!-- Wordmark: "health" -->
  <text x="156" y="38" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="700" 
        font-size="32" 
        fill="#285CCC">health</text>
  
  <!-- Tagline: EMR PLATFORM -->
  <text x="60" y="58" 
        font-family="Inter, Arial, sans-serif" 
        font-weight="500" 
        font-size="9" 
        letter-spacing="2.5" 
        fill="#00272C" 
        opacity="0.7">EMR PLATFORM</text>
  
  <!-- Registration: ™ symbol placeholder -->
  <text x="242" y="46" 
        font-family="Arial, sans-serif" 
        font-size="6" 
        fill="#00272C" 
        opacity="0.5">™</text>
</svg>