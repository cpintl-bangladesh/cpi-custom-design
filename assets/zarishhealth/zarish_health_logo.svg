<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- ZarishHealth Logo - Primary Version -->
  <defs>
    <style>
      .zh-teal { fill: #00555A; }
      .zh-blue { fill: #285CCC; }
      .zh-white { fill: #FFFFFF; }
      .zh-gunmetal { fill: #00272C; }
    </style>
  </defs>
  
  <!-- Logo Background (optional - remove for transparent) -->
  <!-- <rect width="200" height="80" fill="none"/> -->
  
  <!-- Wordmark: "zarish" in teal -->
  <text x="0" y="36" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="32" class="zh-teal">zarish</text>
  
  <!-- Wordmark: "health" in blue -->
  <text x="108" y="36" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="32" class="zh-blue">health</text>
  
  <!-- Subtitle: EMR PLATFORM -->
  <text x="0" y="60" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="10" letter-spacing="2" class="zh-gunmetal">EMR PLATFORM</text>
</svg>