<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <!-- CPI Logo - White Version (for dark backgrounds) -->
  <!-- Full horizontal logo with tagline -->
  
  <defs>
    <style>
      .cpi-white { fill: #FFFFFF; }
      .cpi-red { fill: #D91E4D; }
    </style>
  </defs>
  
  <!-- CPI Text Mark -->
  <text x="10" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="42" class="cpi-white">CPI</text>
  
  <!-- Flower Icon (simplified) -->
  <circle cx="85" cy="40" r="12" fill="none" stroke="#D91E4D" stroke-width="2"/>
  <circle cx="85" cy="28" r="6" class="cpi-red"/>
  <circle cx="97" cy="40" r="6" class="cpi-red"/>
  <circle cx="85" cy="52" r="6" class="cpi-red"/>
  <circle cx="73" cy="40" r="6" class="cpi-red"/>
  
  <!-- Tagline -->
  <text x="10" y="80" font-family="Arial, Helvetica, sans-serif" font-weight="normal" font-size="11" class="cpi-white" letter-spacing="0.5">Empower communities. Transform lives.</text>
</svg>